name: Release Build - Multi-OS

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller Hespia.spec

    - name: Prep Windows Artifact
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        mv dist/Hespia.exe dist/Hespia_Windows.exe

    - name: Prep macOS Artifact
      if: matrix.os == 'macos-latest'
      run: |
        mv dist/Hespia dist/Hespia_macOS

    - name: Prep Linux Artifact
      if: matrix.os == 'ubuntu-latest'
      run: |
        mv dist/Hespia dist/Hespia_Linux

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hespia-${{ matrix.os }}
        path: |
          dist/Hespia_Windows.exe
          dist/Hespia_macOS
          dist/Hespia_Linux

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/Hespia_Windows.exe
          artifacts/Hespia_macOS
          artifacts/Hespia_Linux
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
